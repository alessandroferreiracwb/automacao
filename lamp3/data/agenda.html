<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agendamento ESP32</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #0f172a; color: white; margin: 0; 
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .container { width: 100%; max-width: 450px; padding: 20px; }
    .card { 
      background: #1e293b; padding: 30px 25px; border-radius: 32px; 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
    }
    h3 { margin-top: 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    
    .time-group { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
    .time-box { flex: 1; background: #0f172a; padding: 15px; border-radius: 16px; text-align: center; }
    .time-box label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; letter-spacing: 0.5px; }
    .time-box input { background: transparent; border: none; color: #38bdf8; font-size: 18px; font-weight: bold; width: 100%; text-align: center; outline: none; color-scheme: dark; }
    
    .days-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
    .day-btn { 
      background: #334155; color: #94a3b8; border: none; padding: 12px 5px; 
      font-size: 12px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.2s;
    }
    .day-btn.active { background: #22c55e; color: #052e16; box-shadow: 0 0 15px rgba(34,197,94,0.3); }
    
    .btn-save { 
      width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 16px; 
      font-size: 16px; font-weight: bold; border-radius: 16px; cursor: pointer; transition: 0.2s;
    }
    .btn-save:active { transform: scale(0.95); }
    
    .btn-rtc {
      width: 100%; background: transparent; color: #38bdf8; border: 2px dashed #38bdf8; padding: 12px;
      font-size: 13px; font-weight: bold; border-radius: 16px; cursor: pointer; transition: 0.2s; margin-bottom: 25px;
    }
    .btn-rtc:active { transform: scale(0.95); background: rgba(56,189,248,0.1); }

    .nav-link { display: block; text-align: center; margin-top: 25px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: 0.2s; }
    .nav-link:hover { color: white; }
    .clock-info { background: #0f172a; padding: 15px; border-radius: 16px; text-align: center; margin-bottom: 25px; font-size: 15px; color: #38bdf8; font-weight: bold; border: 1px solid #1e293b; }
    .clock-info span { display: block; font-size: 24px; color: white; margin-top: 5px; font-variant-numeric: tabular-nums; }
    
    hr { border: 0; height: 1px; background: #334155; margin: 25px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h3>Relógio do Sistema</h3>
      <div class="clock-info">
        HORA DO ESP32
        <span id="esp-clock">--:--:--</span>
      </div>

      <h3>Ajuste Manual do Relógio</h3>
      <div class="time-group">
        <div class="time-box">
          <label>DATA ATUAL</label>
          <input type="date" id="manual-date">
        </div>
        <div class="time-box">
          <label>HORA ATUAL</label>
          <input type="time" id="manual-time">
        </div>
      </div>
      <button class="btn-rtc" onclick="setESPClock()">⚙️ SINCRONIZAR COM O TELEFONE</button>

      <hr>

      <h3>Configurar Rotina Semana</h3>
      <div class="time-group">
        <div class="time-box">
          <label>LIGAR ÀS</label>
          <input type="time" id="time-on" value="08:00">
        </div>
        <div class="time-box">
          <label>DESLIGAR ÀS</label>
          <input type="time" id="time-off" value="18:00">
        </div>
      </div>

      <h3 style="font-size: 11px; margin-bottom: 10px;">Dias de Atuação</h3>
      <div class="days-grid">
        <button class="day-btn" onclick="toggleDay(this, 0)">DOM</button>
        <button class="day-btn" onclick="toggleDay(this, 1)">SEG</button>
        <button class="day-btn" onclick="toggleDay(this, 2)">TER</button>
        <button class="day-btn" onclick="toggleDay(this, 3)">QUA</button>
        <button class="day-btn" onclick="toggleDay(this, 4)">QUI</button>
        <button class="day-btn" onclick="toggleDay(this, 5)">SEX</button>
        <button class="day-btn" onclick="toggleDay(this, 6)">SÁB</button>
      </div>

      <button class="btn-save" onclick="saveSchedule()">SALVAR AGENDAMENTO</button>
      
      <a href="/" class="nav-link">← Voltar ao Painel Geral</a>
    </div>
  </div>

<script>
  let selectedDays = [false, false, false, false, false, false, false];

  // Alterna o estado visual e lógico dos botões dos dias da semana
  function toggleDay(btn, index) {
    selectedDays[index] = !selectedDays[index];
    btn.classList.toggle('active', selectedDays[index]);
  }

  // Captura a hora do dispositivo conectado para facilitar o preenchimento manual
  function carregarHoraDispositivo() {
    const agora = new Date();
    const ano = agora.getFullYear();
    const mes = String(agora.getMonth() + 1).padStart(2, '0');
    const dia = String(agora.getDate()).padStart(2, '0');
    const horas = String(agora.getHours()).padStart(2, '0');
    const minutos = String(agora.getMinutes()).padStart(2, '0');
    
    document.getElementById('manual-date').value = `${ano}-${mes}-${dia}`;
    document.getElementById('manual-time').value = `${horas}:${minutos}`;
  }

  // Envia os dados de data e hora do celular para o RTC interno do ESP32
  function setESPClock() {
    const dateVal = document.getElementById('manual-date').value;
    const horaVal = document.getElementById('manual-time').value;

    if (!dateVal || !horaVal) {
      alert("Selecione uma data e hora válidas!");
      return;
    }

    fetch(`/set-rtc?date=${dateVal}&time=${horaVal}`)
      .then(r => r.text())
      .then(res => {
        alert(res);
        updateClock();
      }).catch(err => alert("Erro ao comunicar com o servidor."));
  }

  // Carrega as regras de rotina salvas na memória interna do ESP32
  function loadSchedule() {
    fetch('/get-schedule').then(r => r.json()).then(data => {
      document.getElementById('time-on').value = data.timeOn;
      document.getElementById('time-off').value = data.timeOff;
      selectedDays = data.days;
      const buttons = document.querySelectorAll('.day-grid .day-btn, .days-grid .day-btn');
      buttons.forEach((btn, idx) => {
        btn.classList.toggle('active', selectedDays[idx]);
      });
    }).catch(err => console.log("Erro ao carregar agenda."));
  }

  // Atualiza o relógio digital exibido no topo da página
  function updateClock() {
    fetch('/status').then(r => r.json()).then(data => {
      if(data.clock) {
        document.getElementById('esp-clock').innerText = data.clock;
      }
    }).catch(err => {
      document.getElementById('esp-clock').innerText = "OFFLINE";
    });
  }

  // Envia as regras de horário e dias configurados para o servidor
  function saveSchedule() {
    const tOn = document.getElementById('time-on').value;
    const tOff = document.getElementById('time-off').value;
    const daysStr = selectedDays.map(d => d ? "1" : "0").join(",");

    fetch(`/set-schedule?on=${tOn}&off=${tOff}&days=${daysStr}`)
      .then(r => r.text())
      .then(res => { 
        alert("Configuração de rotina salva com sucesso!"); 
      }).catch(err => alert("Erro ao salvar agendamento."));
  }

  // Atualizações cíclicas da página
  setInterval(updateClock, 1000); // Atualiza o relógio a cada 1 segundo

  window.onload = () => { 
    loadSchedule(); 
    updateClock(); 
    carregarHoraDispositivo(); 
  };
</script>
</body>
</html>
